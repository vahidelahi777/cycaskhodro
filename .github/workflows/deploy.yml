name: Deploy to Production

on:
  push:
    branches: [master]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: self-hosted   # ← runs ON your server, no inbound SSH needed

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install dependencies
        working-directory: apps/frontend
        run: npm ci

      - name: Type check
        working-directory: apps/frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: apps/frontend
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build

      - name: Restart app
        run: |
          pm2 reload cycaskhodro --update-env || \
          pm2 start npm --name cycaskhodro \
            --cwd ${{ github.workspace }}/apps/frontend -- start
          pm2 save
