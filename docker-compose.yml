version: '3.9'

services:
  # ── Next.js App ─────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
      args:
        - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    image: cycaskhodro-app:latest
    container_name: cycaskhodro-app
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      - NEXT_PUBLIC_MAPBOX_TOKEN=${NEXT_PUBLIC_MAPBOX_TOKEN}
      - NEXT_PUBLIC_GA_ID=${NEXT_PUBLIC_GA_ID}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - API_SECRET_KEY=${API_SECRET_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM}
      - EMAIL_TO=${EMAIL_TO}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - cycas-network
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.app.rule=Host(`cycaskhodro.com`)'
      - 'traefik.http.routers.app.tls=true'
      - 'traefik.http.routers.app.tls.certresolver=letsencrypt'
      - 'traefik.http.services.app.loadbalancer.server.port=3000'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Redis (for rate-limiting & session caching) ──────────────────────────────
  redis:
    image: docker.arvancloud.ir/redis:7-alpine
    container_name: cycaskhodro-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-cycasredis}
    volumes:
      - redis-data:/data
    networks:
      - cycas-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Nginx Reverse Proxy (for local dev/staging) ───────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: cycaskhodro-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-cache:/var/cache/nginx
    depends_on:
      - app
    networks:
      - cycas-network
    profiles:
      - production

volumes:
  redis-data:
    driver: local
  nginx-cache:
    driver: local

networks:
  cycas-network:
    driver: bridge
